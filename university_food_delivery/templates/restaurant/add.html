{% extends "base.html" %}

{% block title %}创建餐厅 - 大学外卖系统{% endblock %}

{% block content %}
<h2><i class="bi bi-plus-circle"></i> 创建餐厅</h2>

<div class="row mt-4">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">餐厅名称 *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">餐厅描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="location" class="form-label">餐厅位置 *</label>
                        <input type="text" class="form-control" id="location" name="location" required placeholder="如：学校食堂一楼">
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">联系电话 *</label>
                        <input type="tel" class="form-control" id="phone" name="phone" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="delivery_fee" class="form-label">配送费 (元)</label>
                            <input type="number" step="0.1" class="form-control" id="delivery_fee" name="delivery_fee" value="5.0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="min_order" class="form-label">起送价 (元)</label>
                            <input type="number" step="0.1" class="form-control" id="min_order" name="min_order" value="15.0">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 创建餐厅
                    </button>
                    <a href="{{ url_for('restaurant.manage_menu') }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
